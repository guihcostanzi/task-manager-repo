name: Full Stack Tests

on:
  push:
    branches: [ "main", "tests" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Test Python API
      run: |
        # Updates pip, installs requirements, and runs pytest
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install requests
        python api_test.py

  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend 
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install and Test Frontend
      run: |
        # Installs frontend dependencies and executes the JavaScript test suite
        npm install
        npm test
